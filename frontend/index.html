<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campick</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./index.html" aria-label="Campick 홈">
          <span>Cam `p</span><strong>ick</strong>
        </a>

        <nav class="main-nav" aria-label="주요 메뉴">
          <a href="#campaign-list-title">체험단</a>
          <a href="#">체험단 지도</a>
          <a href="#">누락확인</a>
          <a href="#">저품질 진단</a>
          <a href="#">이용 가이드</a>
          <a href="#">플랫폼 소개</a>
          <a href="#">자주 묻는 질문</a>
        </nav>

        <div class="header-actions">
          <button type="button" class="text-button">로그인</button>
          <button type="button" class="primary-button primary-button--small">회원가입</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero-section">
        <div class="page-shell hero-grid">
          <div class="hero-copy">
            <h1>내게 맞는 <strong>체험단</strong>을<br />한곳에서 찾아보세요</h1>
            <p>블로그, 인스타그램, 유튜브 체험단 정보를<br />한눈에 확인하고 간편하게 신청하세요.</p>
          </div>
          <div class="hero-glow" aria-hidden="true"></div>
        </div>
      </section>

      <section class="page-shell search-section" aria-label="체험단 검색">
        <form class="hero-search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            type="search"
            placeholder="지역 · 업종으로 검색 (예: 강남 맛집, 뷰티, 인스타그램)"
            autocomplete="off"
          />
          <button type="button" class="primary-button">검색</button>
        </form>
      </section>

      <section class="page-shell region-panel" aria-label="지역 선택">
        <div class="region-row region-row--primary" id="province-list"></div>
        <div class="region-row region-row--district" id="district-list"></div>
      </section>

      <section class="page-shell filter-selects" aria-label="상세 필터">
        <select aria-label="카테고리">
          <option>전체</option>
          <option>맛집</option>
          <option>뷰티</option>
          <option>여행</option>
          <option>문화</option>
          <option>운동</option>
          <option>포장</option>
          <option>기타</option>
        </select>
        <select aria-label="채널">
          <option>블로그</option>
          <option>클립</option>
          <option>인스타그램</option>
          <option>릴스</option>
          <option>유튜브</option>
          <option>쇼츠</option>
          <option>스레드</option>
          <option>틱톡</option>
        </select>
        <select aria-label="유형">
          <option>방문형</option>
          <option>배송형</option>
          <option>구매형</option>
          <option>기자단</option>
          <option>기타</option>
        </select>
        <select aria-label="정렬">
          <option>최신순</option>
          <option>마감임박순</option>
          <option>인기순</option>
          <option>경쟁률 낮은순</option>
        </select>
      </section>

      <section class="page-shell campaign-section">
        <div class="campaign-toolbar">
          <div>
            <h2 id="campaign-list-title">전체 체험단 목록</h2>
            <p>총 23,615개의 체험단이 있습니다.</p>
          </div>
        </div>

        <div id="campaign-list" class="campaign-grid" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
